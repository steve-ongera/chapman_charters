<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────── -->
    <title>SkyCharter – Private Jet, Air Cargo & Group Charter</title>
    <meta name="description" content="SkyCharter connects you with world-class air charter solutions — private jet charter, group air charter, air cargo, aircraft leasing, and aviation emergency services. Request a quote instantly, no account needed." />
    <meta name="keywords" content="private jet charter, air cargo, group air charter, aircraft leasing, flight support, aviation emergency services, air broker" />
    <meta name="author" content="SkyCharter Aviation" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.skycharter.aero/" />

    <!-- ── Open Graph / Facebook ───────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.skycharter.aero/" />
    <meta property="og:title"       content="SkyCharter – Private Jet & Air Charter Brokerage" />
    <meta property="og:description" content="Instant quote requests for private jets, air cargo, group charters and more. No account required." />
    <meta property="og:image"       content="https://www.skycharter.aero/og-image.jpg" />

    <!-- ── Twitter Card ────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@SkyCharter" />
    <meta name="twitter:title"       content="SkyCharter – Private Jet & Air Charter" />
    <meta name="twitter:description" content="World-class air charter solutions. Request a quote with no account required." />
    <meta name="twitter:image"       content="https://www.skycharter.aero/og-image.jpg" />

    <!-- ── Favicon ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Bootstrap Icons ─────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- ── Google Fonts ────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Structured Data (JSON-LD) ───────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "SkyCharter",
      "url": "https://www.skycharter.aero",
      "logo": "https://www.skycharter.aero/logo.svg",
      "description": "Air charter brokerage offering private jet, group, cargo, leasing and emergency aviation services.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://twitter.com/SkyCharter",
        "https://www.linkedin.com/company/skycharter"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
